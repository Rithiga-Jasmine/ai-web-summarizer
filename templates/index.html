<!DOCTYPE html>
<html>
<head>
    <title>AI Web Summarizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
            width: 100%;
            max-width: 580px;
            text-align: center;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.92rem;
            color: #111827;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #4f46e5;
        }

        button[type="submit"] {
            width: 100%;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="submit"]:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SUMMARISE ANYTHING HERE</h1>
        <p class="subtitle">Paste any webpage URL and get a quick summary.</p>
        <form method="POST" action="/summary">
            <input type="text" name="url" placeholder="https://example.com/article" required>
            <button type="submit">Summarize →</button>
        </form>
    </div>
</body>
</html>
