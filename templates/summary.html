<!DOCTYPE html>
<html>
<head>
    <title>Summary Result</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
            width: 100%;
            max-width: 580px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 6px;
        }

        .label {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 16px;
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }

        ul li {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.9rem;
            color: #374151;
            line-height: 1.55;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="label">Summary Result</p>
        <h1>Here's what we found 📄</h1>
        <ul style="margin-top: 20px;">
            {% for line in summary %}
                <li>{{ line }}</li>
            {% endfor %}
        </ul>
        <a href="/" class="back-btn">back we go!</a>
    </div>
</body>
</html>
